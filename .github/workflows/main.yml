# 工作流名称：同步上游 VIVA-AI-STUDIO 仓库
name: Sync VIVA-AI-STUDIO Upstream

# 触发条件：每天UTC 0点（北京时间8点） + 手动触发（方便测试）
on:
  schedule:
    - cron: '0 0 * * *'  # 定时规则：分 时 日 月 周（UTC时区）
  workflow_dispatch:     # 手动触发开关（测试用）

# 执行的同步任务
jobs:
  sync-upstream:
    runs-on: ubuntu-latest  # 运行环境：Ubuntu 最新版
    permissions:
      contents: write       # 授予推送代码的权限（必须）

    steps:
      # 步骤1：检出你的 Fork 仓库代码（拉取全历史，方便合并）
      - name: Checkout Fork Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有提交历史，确保合并时能找到完整上下文

      # 步骤2：配置 Git 身份（GitHub Actions 提交代码需要）
      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # 步骤3：添加上游仓库（先检查是否存在，避免重复添加报错）
      - name: Add/Update Upstream Remote
        run: |
          # 若上游仓库已存在，先移除再重新添加；不存在则直接添加
          if git remote | grep -q upstream; then
            git remote remove upstream
          fi
          git remote add upstream https://github.com/vivaapi/VIVA-AI-STUDIO.git

      # 步骤4：拉取上游仓库的最新代码
      - name: Fetch Upstream Changes
        run: git fetch upstream

      # 步骤5：切换到主分支并合并上游代码（增加冲突提示）
      - name: Merge Upstream to Main
        run: |
          # 先切换到主分支（兼容 main/master 两种命名）
          MAIN_BRANCH=$(git branch --list main || git branch --list master)
          if [ -z "$MAIN_BRANCH" ]; then
            echo "Error: 未找到 main 或 master 主分支！"
            exit 1
          fi
          git checkout ${MAIN_BRANCH#* }  # 提取分支名（去掉前缀）
          
          # 合并上游代码，保留本地修改；若冲突则提示并终止（避免自动解决冲突导致代码丢失）
          if ! git merge upstream/main --no-edit; then
            echo "❌ 合并失败：存在代码冲突！请手动解决冲突后再同步。"
            echo "冲突文件列表："
            git diff --name-only --diff-filter=U  # 列出冲突文件
            exit 1
          fi

      # 步骤6：推送合并后的代码到你的 Fork 仓库
      - name: Push to Fork Repository
        run: |
          # 仅当有变更时推送（避免无变更时推送报错）
          if [ -n "$(git status --porcelain)" ]; then
            git push origin HEAD
            echo "✅ 同步成功：已将上游最新代码合并到本地分支，并保留了你的修改。"
          else
            echo "ℹ️ 无需同步：本地分支已与上游保持一致。"
          fi
