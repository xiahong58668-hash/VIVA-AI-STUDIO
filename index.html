<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViVa AI 短视频助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', "PingFang SC", "Microsoft YaHei", "SimHei", "Heiti SC", sans-serif;
        background-color: #1a1a1a;
        color: #000;
        background-image: radial-gradient(#333 1px, transparent 1px);
        background-size: 20px 20px;
      }
      h1, h2, h3, h4, h5, h6, .font-bangers {
        font-family: 'Bangers', "PingFang SC", "Microsoft YaHei", "SimHei", "Heiti SC", sans-serif;
        letter-spacing: 0.05em;
      }
      
      /* Remap font-comic to Heiti stack to replace the handwriting style */
      .font-comic {
        font-family: 'Inter', "PingFang SC", "Microsoft YaHei", "SimHei", "Heiti SC", sans-serif;
      }
      
      /* Ensure font-sans also uses the Heiti stack */
      .font-sans {
        font-family: 'Inter', "PingFang SC", "Microsoft YaHei", "SimHei", "Heiti SC", sans-serif;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #000; 
        border-left: 2px solid #333;
      }
      ::-webkit-scrollbar-thumb {
        background: #FACC15; 
        border: 2px solid #000;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #EAB308; 
      }
      
      .comic-shadow {
        box-shadow: 4px 4px 0px 0px #000;
      }
      .comic-shadow-sm {
        box-shadow: 2px 2px 0px 0px #000;
      }
      .comic-shadow-lg {
        box-shadow: 8px 8px 0px 0px #000;
      }
      .comic-border {
        border: 2px solid #000;
      }
      .halftone-pattern {
         background-image: radial-gradient(circle, #000 1px, transparent 1.5px);
         background-size: 10px 10px;
         opacity: 0.1;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
